name: Development

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.ASSESSFIRST_EC2_PRIVATE_KEY_B64 }}" | base64 --decode > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null

      - name: Add known hosts
        run: ssh-keyscan -H "${{ secrets.ASSESSFIRST_EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Execute script on EC2
        run: |
          ssh "${{ secrets.ASSESSFIRST_EC2_USER }}@${{ secrets.ASSESSFIRST_EC2_HOST }}" << EOF
          set -e
          cd /home/ubuntu/assessfirst_backend
          git checkout main
          git pull
          docker network create assessfirst-network || true
          docker compose -f ./deploy/compose/docker-compose.yaml --env-file .env.docker up -d --build --remove-orphans postgres backend
          docker image prune -f
          EOF