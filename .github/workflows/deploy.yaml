name: Deploy AssessFirst

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH Key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ASSESSFIRST_EC2_PRIVATE_KEY_B64 }}
        run: |
          mkdir -p ~/.ssh

          printf '%s' "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_rsa

          chmod 600 ~/.ssh/id_rsa

          ssh-keygen -lf ~/.ssh/id_rsa

      - name: Add EC2 Host
        run: |
          ssh-keyscan -H "${{ secrets.ASSESSFIRST_EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH Connection
        run: |
          ssh -o StrictHostKeyChecking=no \
          "${{ secrets.ASSESSFIRST_EC2_USER }}@${{ secrets.ASSESSFIRST_EC2_HOST }}" \
          "hostname"

      - name: Deploy Application
        run: |
          ssh -o StrictHostKeyChecking=no \
          "${{ secrets.ASSESSFIRST_EC2_USER }}@${{ secrets.ASSESSFIRST_EC2_HOST }}" << 'EOF'

          set -e

          cd /home/ubuntu/assessfirst_backend

          git checkout main
          git pull origin main

          docker network create assessfirst-network || true

          docker compose \
            --env-file .env.docker \
            -f deploy/compose/docker-compose.yaml \
            up -d --build --remove-orphans

          docker image prune -af

          EOF