name: Deploy AssessFirst

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-assessfirst-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ASSESSFIRST_EC2_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add known hosts
        run: ssh-keyscan -H "${{ secrets.ASSESSFIRST_EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh "${{ secrets.ASSESSFIRST_EC2_USER }}@${{ secrets.ASSESSFIRST_EC2_HOST }}" << 'EOF'
          set -e
          cd /home/ubuntu/assessfirst_backend
          git fetch origin
          git reset --hard origin/main
          git clean -fd
          docker network create assessfirst-network || true
          docker compose -f deploy/compose/docker-compose.yaml up -d --build --remove-orphans
          docker image prune -f
          EOF