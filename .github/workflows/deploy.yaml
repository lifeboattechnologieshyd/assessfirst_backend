name: Deploy AssessFirst

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-assessfirst-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.ASSESSFIRST_EC2_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add known hosts
        run: |
          ssh-keyscan -H "${{ secrets.ASSESSFIRST_EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/id_rsa \
            "${{ secrets.ASSESSFIRST_EC2_USER }}@${{ secrets.ASSESSFIRST_EC2_HOST }}" << 'EOF'
          set -e

          cd /home/ubuntu/assessfirst_backend

          git pull origin main

          docker compose \
            -p assessfirst \
            --env-file .env.docker \
            -f deploy/compose/docker-compose.yaml \
            up -d --build

          docker image prune -f
          EOF