name: Deploy AssessFirst

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/id_rsa <<'EOF'
          ${{ secrets.ASSESSFIRST_EC2_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.ssh/id_rsa

      - name: Add known hosts
        run: |
          ssh-keyscan -H "${{ secrets.ASSESSFIRST_EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh "${{ secrets.ASSESSFIRST_EC2_USER }}@${{ secrets.ASSESSFIRST_EC2_HOST }}" << 'EOF'
          cd /home/ubuntu/assessfirst_backend
          git pull origin main
          docker compose --env-file .env.docker -f deploy/compose/docker-compose.yaml up -d --build
          EOF