name: Deploy AssessFirst

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-assessfirst-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug SSH Key
        run: |
          mkdir -p ~/.ssh

          printf '%s' "${{ secrets.ASSESSFIRST_EC2_PRIVATE_KEY }}" > ~/.ssh/id_rsa

          echo "File Size:"
          wc -c ~/.ssh/id_rsa

          echo "First Line:"
          head -n 1 ~/.ssh/id_rsa

          echo "Last Line:"
          tail -n 1 ~/.ssh/id_rsa

      - name: Add known hosts
        run: |
          ssh-keyscan -H "${{ secrets.ASSESSFIRST_EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.ASSESSFIRST_EC2_USER }}@${{ secrets.ASSESSFIRST_EC2_HOST }}" \
            "hostname"

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.ASSESSFIRST_EC2_USER }}@${{ secrets.ASSESSFIRST_EC2_HOST }}" << 'EOF'
          set -e
          cd /home/ubuntu/assessfirst_backend
          git checkout main
          git pull origin main
          docker network create assessfirst-network || true
          docker compose --env-file .env.docker -f deploy/compose/docker-compose.yaml up -d --build --remove-orphans
          docker image prune -af
          EOF