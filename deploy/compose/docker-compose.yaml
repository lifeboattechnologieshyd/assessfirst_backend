services:
  postgres:
    image: postgres:17
    container_name: assessfirst-postgres
    restart: unless-stopped
    env_file:
      - ../../.env.docker
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - assessfirst-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: assessfirst-backend:latest
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: assessfirst-backend
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      POSTGRES_DB_HOST: postgres
      POSTGRES_DB_PORT: 5432
      POSTGRES_DB_NAME: ${POSTGRES_DB}
      POSTGRES_DB_USER: ${POSTGRES_USER}
      POSTGRES_DB_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB_SSL_ENABLED: "False"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${HTTP_PORT}:8000"
    networks:
      - assessfirst-network

volumes:
  pg_data:

networks:
  assessfirst-network:
    external: true